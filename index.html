<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>Agenda de Alunos</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<header>
			<div class="header-container">
				<h1>Calendário de Atendimentos</h1>
				<div class="search-box">
					<div class="input-wrapper">
						<input type="text" id="search-input" placeholder="Pesquisar nome do aluno..." onkeyup="pesquisarAluno()">
						<span id="clear-search" onclick="limparPesquisa()">×</span>
					</div>
				</div>
			</div>
		</header>

		<main>
			<section id="booking-section">
				<div class="appointments-container">
    				<h2>Novo Agendamento</h2>
				</div>
				<input type="date" id="booking-date" onchange="gerarCalendario(); atualizarHorariosLivres();">
				<select id="free-slots">
					<option value="">Selecione um horário</option>
				</select>
				<input type="text" id="student-name" placeholder="Evento">
				<button onclick="salvarAgendamento()">Marcar Horário</button>
			</section>

			<section id="calendar-view">
				<!-- Container da Lista de Compromissos -->
				<div class="appointments-container">
					<div class="header-compromissos">
    					<h2>Compromissos do Dia <span id="data-dinamica" style="color: #666; font-size: 0.8em; margin-left: 10px;"></span></h2>
					</div>
					
					<!-- É aqui que o JavaScript vai "injetar" as caixinhas (cards) -->
					<div id="events-list">
						<!-- O conteúdo será gerado dinamicamente pelo JS -->
						<p>Selecione um dia no calendário para ver os compromissos.</p>
					</div>
				</div>
			</section>

			<div class="calendar-container">
				<div class="calendar-header">
					<button onclick="mudarMes(-1)">◀</button>
					<h2 id="mes-ano" onclick="voltarAoMesAtual()" style="cursor: pointer;" title="Voltar para hoje"></h2>
					<button onclick="mudarMes(1)">▶</button>
				</div>
				<table id="calendar-table">
				<thead>
						<tr>
							<th>Seg</th>
							<th>Ter</th>
							<th>Qua</th>
							<th>Qui</th>
							<th>Sex</th>
						</tr>
				</thead>
					<tbody id="calendar-body">
						<!-- Os dias aparecerão aqui via JS -->
					</tbody>
				</table>
			</div>
		</main>

		<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
		<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

		<script>
			const firebaseConfig = {
				apiKey: "AIzaSyDmgmXzCZC72gLkFmUQv4lmlev8w7IGOvo",
				authDomain: "agenda-alunos-a7b91.firebaseapp.com",
				databaseURL: "https://agenda-alunos-a7b91-default-rtdb.firebaseio.com",
				projectId: "agenda-alunos-a7b91",
				storageBucket: "agenda-alunos-a7b91.firebasestorage.app",
				messagingSenderId: "99076700914",
				appId: "1:99076700914:web:dbe766448fa03a32762e6b"
			};

			// Inicializa o Firebase
			firebase.initializeApp(firebaseConfig);
			
			// Cria a variável global que o seu script.js vai usar
			window.database = firebase.database();
		</script>

		<script src="script.js"></script>		
	</body>
</html>
